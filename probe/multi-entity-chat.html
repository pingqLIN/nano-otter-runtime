<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multi Entity Nano Chat</title>
  <style>
    :root {
      --bg: #eef0f7;
      --panel: #fbfcff;
      --ink: #1b2032;
      --muted: #5d6784;
      --line: #cad2e8;
      --accent: #155dd8;
      --accent-2: #cc5530;
      --user: #ecf3ff;
      --bot: #f4f8ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 8% 10%, rgba(21, 93, 216, 0.2), transparent 35%),
        radial-gradient(circle at 92% 12%, rgba(204, 85, 48, 0.2), transparent 36%),
        var(--bg);
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 16px 14px 22px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 10px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(14, 31, 65, 0.12);
      padding: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.12rem;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .status {
      margin-top: 10px;
      display: inline-flex;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.83rem;
      font-weight: 700;
      background: #fff8ea;
      color: #946100;
    }

    .cards {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .entity-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
    }

    .entity-title {
      margin: 0;
      font-size: 0.96rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 2px 8px;
      font-size: 0.74rem;
      color: var(--muted);
      background: #f8fbff;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    textarea {
      margin-top: 8px;
      width: 100%;
      min-height: 76px;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 8px;
      resize: vertical;
      font-family: inherit;
    }

    .actions {
      margin-top: 7px;
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 10px;
      cursor: pointer;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent);
    }

    .timeline {
      min-height: 440px;
      max-height: 58vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .turn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.45;
      background: #fff;
    }

    .turn.user { background: var(--user); }
    .turn.bot { background: var(--bot); }

    .turn-meta {
      font-size: 0.76rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .right-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    pre {
      margin: 0;
      min-height: 220px;
      max-height: 260px;
      overflow: auto;
      border-radius: 9px;
      border: 1px solid #d6d8e1;
      background: #121622;
      color: #d8e9ff;
      padding: 8px;
      font-size: 0.77rem;
      line-height: 1.42;
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }

      .timeline {
        max-height: 44vh;
      }

      .right-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>多人實體情境測試</h1>
      <div class="sub">單一 NANO 連線下，用交換層虛擬出多實體。每個實體有獨立的 entity id、caller style、history、audit。</div>
      <div id="status" class="status">Detecting API...</div>

      <div id="entityCards" class="cards"></div>

      <div class="actions">
        <button id="btnRunScenario" class="secondary">一鍵跑情境</button>
        <button id="btnClear">清空時間線</button>
      </div>
    </section>

    <section class="panel">
      <div id="timeline" class="timeline"></div>
      <div class="right-grid">
        <article>
          <h3>Audit Trail</h3>
          <pre id="auditJson"></pre>
        </article>
        <article>
          <h3>Entity Snapshot</h3>
          <pre id="entitiesJson"></pre>
        </article>
      </div>
    </section>
  </div>

  <script src="nano-exchange-layer.js"></script>
  <script src="multi-entity-chat.js"></script>
</body>
</html>
