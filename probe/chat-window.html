<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Nano Exchange Chat</title>
  <style>
    :root {
      --bg-0: #f5efe3;
      --bg-1: #f0e2c9;
      --card: #fffdf7;
      --ink: #1f1a14;
      --muted: #6a5a44;
      --line: #d6c4a8;
      --accent: #b3572b;
      --accent-soft: #ffe8dc;
      --ok: #0f7a42;
      --warn: #8b5e10;
      --user: #fff4ee;
      --bot: #f5f8ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 5%, rgba(179, 87, 43, 0.18), transparent 38%),
        radial-gradient(circle at 92% 15%, rgba(64, 98, 173, 0.18), transparent 40%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      min-height: 100vh;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px 14px 26px;
    }

    .top,
    .chat,
    .input,
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(70, 41, 16, 0.08);
    }

    .top {
      padding: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .status {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .status.ok { background: #e7f8ee; color: var(--ok); }
    .status.warn { background: #fff5e5; color: var(--warn); }

    .entity-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    input,
    select,
    textarea,
    button {
      font-family: inherit;
      font-size: 0.95rem;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 9px;
      background: #ffffff;
      color: var(--ink);
    }

    .entity-actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: #fffbf2;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .chat {
      margin-top: 12px;
      min-height: 360px;
      max-height: 56vh;
      overflow: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 92%;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 9px 11px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      animation: liftIn 0.18s ease;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
    }

    .meta {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
    }

    .input {
      margin-top: 12px;
      padding: 12px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(179, 87, 43, 0.25);
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
      border-color: var(--accent);
    }

    .grid {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .panel {
      padding: 10px;
    }

    .panel h2 {
      margin: 0 0 6px;
      font-size: 0.96rem;
    }

    pre {
      margin: 0;
      min-height: 200px;
      max-height: 240px;
      overflow: auto;
      border-radius: 8px;
      border: 1px solid #dbd8cf;
      background: #141414;
      color: #e6f5ff;
      padding: 8px;
      font-size: 0.8rem;
      line-height: 1.45;
      display: none;
    }

    @keyframes liftIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 940px) {
      .entity-grid { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="top">
      <h1>NANO 交換層聊天視窗</h1>
      <div class="sub">所有對話都會透過交換層封裝為實體封包（識別、記錄、保護）。適合單模型連線下模擬多瀏覽器/多帳號。</div>
      <div id="status" class="status warn">Detecting API...</div>

      <div class="entity-grid">
        <div>
          <label for="browserId">Browser ID</label>
          <input id="browserId" value="browser-a" />
        </div>
        <div>
          <label for="accountId">Account ID</label>
          <input id="accountId" value="user-001" />
        </div>
        <div>
          <label for="callerStyle">來電型態</label>
          <select id="callerStyle">
            <option value="male-call">男來電</option>
            <option value="female-call">女來電</option>
            <option value="neutral">一般</option>
          </select>
        </div>
        <div>
          <label for="channel">Channel</label>
          <input id="channel" value="web-chat" />
        </div>
        <div>
          <label for="entityId">Entity ID (選填)</label>
          <input id="entityId" placeholder="自動產生" />
        </div>
      </div>

      <div class="entity-actions">
        <button id="btnMale" class="secondary">切男來電</button>
        <button id="btnFemale" class="secondary">切女來電</button>
        <span class="tag" id="currentEntity">entity: -</span>
      </div>
    </section>

    <section id="chat" class="chat"></section>

    <section class="input">
      <textarea id="prompt" placeholder="輸入內容（可混合不同帳號反覆切換，觀察交換層如何隔離上下文）"></textarea>
      <div class="actions">
        <button id="btnSend">Send</button>
        <button id="btnSelfTest" class="secondary">Self Test</button>
        <button id="btnClear" class="secondary">Clear Chat</button>
        <button id="btnProbe" class="secondary">Toggle Probe</button>
        <button id="btnAudit" class="secondary">Toggle Audit</button>
      </div>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>Probe JSON</h2>
        <pre id="probeJson"></pre>
      </article>
      <article class="panel">
        <h2>Exchange Audit</h2>
        <pre id="auditJson"></pre>
      </article>
    </section>
  </div>

  <script src="nano-exchange-layer.js"></script>
  <script src="chat-window.js"></script>
</body>
</html>
